name = "braize-worker"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Public, non-secret config. Safe to commit.
[vars]
HACKCLUB_AUTH_CLIENT_ID = "5d55fc042761a61272e88549fc0dbadf"
HACKCLUB_AUTH_REDIRECT_URI = "https://hackclubium.github.io/Braize/"
HACKATIME_OAUTH_CLIENT_ID = "n45aqUCSVzAloc5wv2zTQKzQzCVHYphzdIJs1i3aWxs"
HACKATIME_OAUTH_REDIRECT_URI = "https://hackclubium.github.io/Braize/"
ALLOWED_ORIGIN = "https://hackclubium.github.io"
# Set this to the bucket's public r2.dev URL or custom domain, without trailing slash.
PUBLIC_UPLOAD_BASE_URL = "https://pub-f3d415aa090d4cfb9c594a5e9ba99f1f.r2.dev"

# These are set separately as secrets, never in this file:
#   wrangler secret put HACKCLUB_AUTH_CLIENT_SECRET
#   wrangler secret put HACKATIME_OAUTH_CLIENT_SECRET

# Created with `wrangler d1 create braize-db`, then paste the printed
# database_id below. Apply schema with:
#   wrangler d1 execute braize-db --remote --file=./migrations/0001_init.sql
[[d1_databases]]
binding = "DB"
database_name = "braize-db"
database_id = "2629c36f-797e-4af3-8d8b-0cbad0d18d7f"

[[r2_buckets]]
binding = "JOURNAL_IMAGES"
bucket_name = "braize-journal-images"
